function setupDataSync() {
    if (!authReady) return;
    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', 'default');
    onSnapshot(docRef, (snap) => {
        if (snap.exists()) {
            CONTACT_DATA = snap.data();
            updateUI();
            localStorage.setItem('contact_profile_data', JSON.stringify(CONTACT_DATA));
        }
    }, (err) => {
        console.error("Firestore Sync Error:", err);
        tryLoadLocalProfileIfNeeded();
    });
}
function applyTheme(theme) {
    theme = theme || {};
    document.body.style.setProperty('--theme-primary', theme.primary || '#3b82f6');
    document.body.style.setProperty('--theme-secondary', theme.secondary || '#1f2937');
    document.body.style.setProperty('--theme-accent', theme.accent || '#eab308');
    document.body.style.setProperty('--theme-bg', theme.background || '#ffffff');
}
function fontStyleToCSS(obj) {
    if (!obj) return "";
    let css = "";
    if(obj.bold) css += "font-weight:bold;";
    if(obj.italic) css += "font-style:italic;";
    if(obj.underline) css += "text-decoration:underline;";
    return css;
}
function updateUI() {
    document.getElementById('display-name').textContent = CONTACT_DATA.name;
    document.getElementById('display-name').style.color    = CONTACT_DATA.theme?.nameText    || "#1e293b";
    document.getElementById('display-name').style.cssText += fontStyleToCSS(CONTACT_DATA.theme?.nameFontStyle);

    document.getElementById('display-org').textContent = CONTACT_DATA.organization;
    document.getElementById('display-org').style.color     = CONTACT_DATA.theme?.companyText || "#3b82f6";
    document.getElementById('display-org').style.cssText += fontStyleToCSS(CONTACT_DATA.theme?.orgFontStyle);

    document.getElementById('display-title').textContent = CONTACT_DATA.title;
    document.getElementById('display-title').style.color   = CONTACT_DATA.theme?.titleText   || "#333333";
    document.getElementById('display-title').style.cssText += fontStyleToCSS(CONTACT_DATA.theme?.titleFontStyle);

    document.getElementById('display-bio').textContent = CONTACT_DATA.bio || "";
    document.getElementById('display-bio').style.color     = CONTACT_DATA.theme?.bioText     || "#64748b";
    document.getElementById('display-bio').style.cssText += fontStyleToCSS(CONTACT_DATA.theme?.bioFontStyle);

    document.getElementById('profilePicture').src = CONTACT_DATA.image;
    document.getElementById('companyLogo').src = CONTACT_DATA.logo || "";
    document.getElementById('btn-website').href = CONTACT_DATA.website || '#';
    document.getElementById('btn-location').href = CONTACT_DATA.location || '#';
    applyTheme(CONTACT_DATA.theme);

    const cLContainer = document.getElementById('custom-links-container');
    cLContainer.innerHTML = (CONTACT_DATA.customLinks || []).map(link => `
        <a href="${link.url}" target="_blank" class="flex items-center justify-between p-3 bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-md transition-shadow">
            <span class="text-sm font-bold text-gray-800">${link.label}</span>
            <i data-lucide="external-link" class="w-4 h-4 text-gray-400"></i>
        </a>
    `).join('');
    const pContainer = document.getElementById('phone-buttons-container');
    pContainer.innerHTML = (CONTACT_DATA.phones || []).map(num => `
        <a href="tel:${num}" class="contact-btn flex items-center justify-center p-3 font-semibold rounded-lg"
            style="background:${CONTACT_DATA.theme?.callBtnBg || '#22c55e'}; color:${CONTACT_DATA.theme?.callBtnText || '#ffffff'}">
            <i data-lucide="phone" class="w-5 h-5 mr-2"></i>
            Call: <span style="color:${CONTACT_DATA.theme?.callBtnText || '#ffffff'}">${num}</span>
        </a>
    `).join('');
    const eContainer = document.getElementById('contact-buttons-container');
    eContainer.innerHTML = CONTACT_DATA.email ? `<a href="mailto:${CONTACT_DATA.email}" class="contact-btn flex items-center justify-center p-3 font-semibold rounded-lg"><i data-lucide="mail" class="w-5 h-5 mr-2"></i>Send Email</a>` : "";
    const sContainer = document.getElementById('social-container');
    sContainer.innerHTML = (CONTACT_DATA.socialLinks || []).map(s => {
        const p = PLATFORMS[s.platform];
        if (!p) return "";
        return `<a href="${s.url}" target="_blank" class="w-10 h-10 flex items-center justify-center rounded-full shadow-md ${p.class} transform hover:scale-110 transition-transform"><i class="fa-brands ${p.icon} text-xl"></i></a>`;
    }).join('');
    lucide.createIcons();

    const downloadBtn = document.getElementById('downloadButton');
    if (downloadBtn) {
      downloadBtn.style.background   = CONTACT_DATA.theme?.downloadBtnBg   || "#2563eb";
      downloadBtn.style.color        = CONTACT_DATA.theme?.downloadBtnText || "#ffffff";
    }
    const vcfBtn = document.getElementById('vcfButton');
    if (vcfBtn) {
      vcfBtn.style.background   = CONTACT_DATA.theme?.addToContactsBtnBg   || "#000000";
      vcfBtn.style.color        = CONTACT_DATA.theme?.addToContactsBtnText || "#ffffff";
    }
    const qrBtn = document.getElementById('qrBtn');
    if (qrBtn) {
      qrBtn.style.background   = CONTACT_DATA.theme?.accent || "#eab308";
      qrBtn.style.color        = "#333333";
    }
    const emailBtn = (
      document.getElementById('contact-buttons-container').querySelector('a[href^="mailto:"]')
    );
    if (emailBtn) {
      emailBtn.style.background = CONTACT_DATA.theme?.emailBtnBg   || "#dc2626";
      emailBtn.style.color      = CONTACT_DATA.theme?.emailBtnText || "#ffffff";
    }
}
function fileToBase64(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsDataURL(file);
    });
}
document.getElementById('uploadProfile').onchange = async (e) => {
    if (e.target.files?.[0]) {
        tempProfileBase64 = await fileToBase64(e.target.files[0]);
        document.getElementById('editProfilePreview').src = tempProfileBase64;
    }
};
document.getElementById('uploadLogo').onchange = async (e) => {
    if (e.target.files?.[0]) {
        tempLogoBase64 = await fileToBase64(e.target.files[0]);
        document.getElementById('editLogoPreview').src = tempLogoBase64;
    }
};
window.toggleView = (v) => {
    ['cardView', 'loginView', 'editView'].forEach(id => document.getElementById(id).classList.add('hidden-view'));
    const target = document.getElementById(v + 'View');
    if (target) target.classList.remove('hidden-view');
};
document.getElementById('authBtn').onclick = () => window.toggleView('login');
document.getElementById('doLogin').onclick = () => {
    const pass = document.getElementById('loginPass').value;
    if (pass === CONTACT_DATA.adminPassword) {
        loadEditForm();
        window.toggleView('edit');
        document.getElementById('loginPass').value = "";
    } else {
        const msg = document.createElement('div');
        msg.className = "text-red-500 text-xs text-center mt-2";
        msg.innerText = "Incorrect Password";
        document.getElementById('loginView').appendChild(msg);
        setTimeout(() => msg.remove(), 2000);
    }
};
function loadEditForm() {
    document.getElementById('editName').value = CONTACT_DATA.name;
    document.getElementById('editOrg').value = CONTACT_DATA.organization;
    document.getElementById('editTitle').value = CONTACT_DATA.title;
    document.getElementById('editBio').value = CONTACT_DATA.bio || "";
    document.getElementById('editEmail').value = CONTACT_DATA.email;
    document.getElementById('editWebsite').value = CONTACT_DATA.website;
    document.getElementById('editLocation').value = CONTACT_DATA.location;
    document.getElementById('editPassword').value = CONTACT_DATA.adminPassword;
    document.getElementById('editProfilePreview').src = CONTACT_DATA.image;
    document.getElementById('editLogoPreview').src = CONTACT_DATA.logo || "";
    tempProfileBase64 = CONTACT_DATA.image;
    tempLogoBase64 = CONTACT_DATA.logo;

    document.getElementById('editThemePrimary').value = CONTACT_DATA.theme?.primary || "#3b82f6";
    document.getElementById('editThemeSecondary').value = CONTACT_DATA.theme?.secondary || "#1f2937";
    document.getElementById('editThemeAccent').value = CONTACT_DATA.theme?.accent || "#eab308";
    document.getElementById('editThemeBackground').value = CONTACT_DATA.theme?.background || "#ffffff";
    document.getElementById('editTextNameColor').value    = CONTACT_DATA.theme?.nameText    || "#1e293b";
    document.getElementById('editTextCompanyColor').value = CONTACT_DATA.theme?.companyText || "#3b82f6";
    document.getElementById('editTextTitleColor').value   = CONTACT_DATA.theme?.titleText   || "#333333";
    document.getElementById('editTextBioColor').value     = CONTACT_DATA.theme?.bioText     || "#64748b";
    document.getElementById('editDownloadBtnBg').value   = CONTACT_DATA.theme?.downloadBtnBg      || "#2563eb";
    document.getElementById('editDownloadBtnText').value = CONTACT_DATA.theme?.downloadBtnText    || "#ffffff";
    document.getElementById('editAddToContactsBtnBg').value   = CONTACT_DATA.theme?.addToContactsBtnBg   || "#000000";
    document.getElementById('editAddToContactsBtnText').value = CONTACT_DATA.theme?.addToContactsBtnText || "#ffffff";
    document.getElementById('editEmailBtnBg').value   = CONTACT_DATA.theme?.emailBtnBg   || "#dc2626";
    document.getElementById('editEmailBtnText').value = CONTACT_DATA.theme?.emailBtnText || "#ffffff";
    document.getElementById('editCallBtnBg').value   = CONTACT_DATA.theme?.callBtnBg   || "#22c55e";
    document.getElementById('editCallBtnText').value = CONTACT_DATA.theme?.callBtnText || "#ffffff";
    const styleDefaults = LATEST_BASE_DATA.theme;
    function loadFont(idPrefix, styleObj) {
        document.getElementById(idPrefix + "FontBold").checked      = !!(styleObj?.bold);
        document.getElementById(idPrefix + "FontItalic").checked   = !!(styleObj?.italic);
        document.getElementById(idPrefix + "FontUnderline").checked= !!(styleObj?.underline);
    }
    loadFont("name",  CONTACT_DATA.theme?.nameFontStyle ?? styleDefaults.nameFontStyle);
    loadFont("org",   CONTACT_DATA.theme?.orgFontStyle  ?? styleDefaults.orgFontStyle);
    loadFont("title", CONTACT_DATA.theme?.titleFontStyle?? styleDefaults.titleFontStyle);
    loadFont("bio",   CONTACT_DATA.theme?.bioFontStyle  ?? styleDefaults.bioFontStyle);
    const ph = document.getElementById('phonesEditor');
    ph.innerHTML = "";
    (CONTACT_DATA.phones || []).forEach(p => ph.appendChild(createPhoneItem(p)));
    const soc = document.getElementById('socialsEditor');
    soc.innerHTML = "";
    (CONTACT_DATA.socialLinks || []).forEach(s => soc.appendChild(createSocialItem(s.platform, s.url)));
    const cl = document.getElementById('customLinksEditor');
    cl.innerHTML = "";
    (CONTACT_DATA.customLinks || []).forEach(link => cl.appendChild(createCustomLinkItem(link.label, link.url)));
    lucide.createIcons();
}
document.getElementById('saveEdit').onclick = async () => {
    if (!authReady) return;
    const loader = document.getElementById('loadingOverlay');
    loader.style.display = 'flex';

    function collectFont(idPrefix) {
        return {
          bold:      document.getElementById(idPrefix + "FontBold").checked,
          italic:    document.getElementById(idPrefix + "FontItalic").checked,
          underline: document.getElementById(idPrefix + "FontUnderline").checked
        }
    }

    try {
        const updated = {
            ...CONTACT_DATA,
            name: document.getElementById('editName').value,
            organization: document.getElementById('editOrg').value,
            title: document.getElementById('editTitle').value,
            bio: document.getElementById('editBio').value,
            email: document.getElementById('editEmail').value,
            website: document.getElementById('editWebsite').value,
            location: document.getElementById('editLocation').value,
            adminPassword: document.getElementById('editPassword').value,
            image: tempProfileBase64,
            logo: tempLogoBase64,
            phones: Array.from(document.querySelectorAll('.phone-input')).map(i => i.value).filter(v => v.trim()),
            socialLinks: Array.from(document.querySelectorAll('#socialsEditor > div')).map(div => ({
                platform: div.querySelector('.social-platform').value,
                url: div.querySelector('.social-url').value
            })).filter(s => s.url.trim()),
            customLinks: Array.from(document.querySelectorAll('#customLinksEditor > div')).map(div => ({
                label: div.querySelector('.custom-link-label').value,
                url: div.querySelector('.custom-link-url').value
            })).filter(l => l.label.trim() && l.url.trim()),
            theme: {
                primary: document.getElementById('editThemePrimary').value,
                secondary: document.getElementById('editThemeSecondary').value,
                accent: document.getElementById('editThemeAccent').value,
                background: document.getElementById('editThemeBackground').value,
                nameText: document.getElementById('editTextNameColor').value,
                companyText: document.getElementById('editTextCompanyColor').value,
                titleText: document.getElementById('editTextTitleColor').value,
                bioText: document.getElementById('editTextBioColor').value,
                downloadBtnBg: document.getElementById('editDownloadBtnBg').value,
                downloadBtnText: document.getElementById('editDownloadBtnText').value,
                addToContactsBtnBg: document.getElementById('editAddToContactsBtnBg').value,
                addToContactsBtnText: document.getElementById('editAddToContactsBtnText').value,
                emailBtnBg: document.getElementById('editEmailBtnBg').value,
                emailBtnText: document.getElementById('editEmailBtnText').value,
                callBtnBg: document.getElementById('editCallBtnBg').value,
                callBtnText: document.getElementById('editCallBtnText').value,
                nameFontStyle: collectFont("name"),
                orgFontStyle:  collectFont("org"),
                titleFontStyle:collectFont("title"),
                bioFontStyle:  collectFont("bio")
            }
        };
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', 'default');
        await setDoc(docRef, updated);
        localStorage.setItem('contact_profile_data', JSON.stringify(updated));
        window.toggleView('card');
    } catch (err) {
        console.error("Save Error:", err);
    } finally {
        loader.style.display = 'none';
    }
};
function createPhoneItem(v = "") {
    const d = document.createElement('div');
    d.className = "flex gap-2";
    d.innerHTML = `<input type="text" value="${v}" class="phone-input flex-1 p-2 border rounded text-sm"><button onclick="this.parentElement.remove()" class="text-red-500 px-2 font-bold">×</button>`;
    return d;
}
function createSocialItem(p = "linkedin", u = "") {
    const d = document.createElement('div');
    d.className = "flex flex-col gap-1 p-2 bg-gray-50 rounded border relative";
    let opts = Object.keys(PLATFORMS).map(k => `<option value="${k}" ${k===p?'selected':''}>${k}</option>`).join('');
    d.innerHTML = `<button onclick="this.parentElement.remove()" class="absolute top-1 right-1 text-red-500 font-bold">×</button>
                   <select class="social-platform p-1 text-xs bg-white border">${opts}</select>
                   <input type="text" value="${u}" class="social-url p-1 text-xs border" placeholder="URL">`;
    return d;
}
function createCustomLinkItem(l = "", u = "") {
    const d = document.createElement('div');
    d.className = "flex flex-col gap-1 p-3 bg-gray-50 rounded-xl border relative";
    d.innerHTML = `<button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-red-500 font-bold">×</button>
                   <input type="text" value="${l}" class="custom-link-label p-2 text-xs border rounded mb-1" placeholder="Link Tag Name">
                   <input type="text" value="${u}" class="custom-link-url p-2 text-xs border rounded" placeholder="URL">`;
    return d;
}
document.getElementById('addPhone').onclick = () => document.getElementById('phonesEditor').appendChild(createPhoneItem());
document.getElementById('addSocial').onclick = () => document.getElementById('socialsEditor').appendChild(createSocialItem());
document.getElementById('addCustomLink').onclick = () => document.getElementById('customLinksEditor').appendChild(createCustomLinkItem());
document.getElementById('downloadButton').onclick = () => {
    const element = document.getElementById('id-card-content');
    html2canvas(element, { scale: 2, useCORS: true, backgroundColor: null }).then(canvas => {
        const l = document.createElement('a');
        l.download = `Sofonias_Genanaw_Card.png`;
        l.href = canvas.toDataURL('image/png');
        l.click();
    });
};
document.getElementById('vcfButton').onclick = () => {
    let v = `BEGIN:VCARD\nVERSION:3.0\nFN:${CONTACT_DATA.name}\nORG:${CONTACT_DATA.organization}\nTITLE:${CONTACT_DATA.title}\n`;
    (CONTACT_DATA.phones || []).forEach(p => v += `TEL;TYPE=CELL:${p}\n`);
    if (CONTACT_DATA.email) v += `EMAIL:${CONTACT_DATA.email}\n`;
    if (CONTACT_DATA.website) v += `URL:${CONTACT_DATA.website}\n`;
    v += `END:VCARD`;
    const b = new Blob([v], { type: 'text/vcard' });
    const l = document.createElement('a');
    l.href = URL.createObjectURL(b);
    l.download = `${CONTACT_DATA.name.replace(/\s+/g, '_')}.vcf`;
    l.click();
};
document.getElementById('qrBtn').onclick = function() {
    const qrDiv = document.getElementById('qrCodeBox');
    qrDiv.innerHTML = "";
    const url = CONTACT_DATA.website || window.location.href;
    const qrCode = new QRCode(qrDiv, {
      text: url,
      width: 200,
      height: 200
    });
    setTimeout(()=> {
      const img = qrDiv.querySelector("img");
      if (img) {
        const downBtn = document.createElement('a');
        downBtn.textContent = "Download This QR";
        downBtn.className = "block mt-4 bg-blue-600 text-white py-2 px-4 rounded-xl text-center shadow-lg";
        downBtn.href = img.src;
        downBtn.download = "business_card_qr.png";
        qrDiv.appendChild(downBtn);
      }
    }, 300);
};
//==== OFFLINE/LOCAL STORAGE section ====
function tryLoadLocalProfileIfNeeded() {
    if (!navigator.onLine) {
        const cached = localStorage.getItem('contact_profile_data');
        if (cached) {
            CONTACT_DATA = JSON.parse(cached);
            updateUI();
            const status = document.getElementById('syncStatus');
            status.textContent = "SYNC: OFFLINE (LOCAL DATA)";
            status.className = "status-offline";
        }
    }
}
window.addEventListener('offline', tryLoadLocalProfileIfNeeded);
window.addEventListener('online', () => location.reload());
if (!navigator.onLine) {
    tryLoadLocalProfileIfNeeded();
}
updateUI();
runAuth();
    </script>
